name: Run Pre-commit Checks

on:
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  pre_commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - uses: pre-commit/action@v3.0.0
